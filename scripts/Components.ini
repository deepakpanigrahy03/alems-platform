1. energy_engine.py (Main Orchestrator)

class EnergyEngine:
    """
    Main energy measurement engine orchestrating all readers.
    
    This is the primary interface for Modules 2 and 3. It provides:
    1. Context manager for easy measurement
    2. High-frequency sampling (Req 1.46)
    3. Idle baseline subtraction (Req 1.45)
    4. Core pinning (Req 1.15)
    5. Measurement validation
    """
    
    def __init__(self, config_loader):
        """Initialize with configuration from Module 0."""
        
    def pin_cores(self, cores: List[int]) -> None:
        """Req 1.15: Pin process to specific CPU cores."""
        
    def measure_idle_baseline(self, duration_seconds: int = 5) -> Dict[str, float]:
        """Req 1.45: Measure system idle energy baseline."""
        
    def start_measurement(self) -> str:
        """Start a new measurement session."""
        
    def stop_measurement(self) -> EnergyMeasurement:
        """Stop current measurement and return results."""
        
    def run_multiple(self, func, iterations=10, cool_down=30) -> List[EnergyMeasurement]:
        """Run multiple measurements with statistics."""
        
    def __enter__(self):
        """Context manager entry."""
        
    def __exit__(self, exc_type, exc_val, exc_tb):
        """Context manager exit."""

