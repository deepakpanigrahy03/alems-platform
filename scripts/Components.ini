7. readers/scheduler_monitor.py (Req 1.12, 1.23, 1.24, 1.36)

@dataclass
class EnergyMeasurement:
    """Complete energy measurement result."""
    
    # Metadata
    measurement_id: str
    start_time: float
    end_time: float
    duration_seconds: float
    
    # RAPL domains
    package_energy_uj: int = 0
    core_energy_uj: int = 0
    dram_energy_uj: Optional[int] = None
    gpu_energy_uj: Optional[int] = None
    uncore_waste_uj: int = 0
    
    # Performance counters
    performance: PerformanceCounters = field(default_factory=PerformanceCounters)
    
    # Thermal data
    thermal: ThermalReadings = field(default_factory=ThermalReadings)
    
    # Power states
    power_state: PowerState = field(default_factory=PowerState)
    
    # Scheduler metrics
    scheduler: SchedulerMetrics = field(default_factory=SchedulerMetrics)
    
    # Derived metrics
    idle_baseline_correction_joules: float = 0.0
    measurement_valid: bool = True
    validation_issues: List[str] = field(default_factory=list)
    
    def to_dict(self) -> Dict[str, Any]:
        """Convert to dictionary for serialization."""
        
    def to_json(self) -> str:
        """Convert to JSON string."""


