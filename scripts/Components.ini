 Integration Points

 # EnergyEngine reads from Module 0
config = ConfigLoader()  # From Module 0
hw_config = config.get_hardware_config()
settings = config.get_settings()
country_data = config.get_grid_intensity("US")  # For Module 2

With Module 2 (Sustainability)

# EnergyEngine produces EnergyMeasurement
measurement = engine.stop_measurement()

# Pass to Module 2
from core.sustainability import SustainabilityCalculator
sustainability = SustainabilityCalculator(config)
results = sustainability.calculate_sustainability(
    measurement_id=measurement.measurement_id,
    total_energy_joules=measurement.package_energy_joules / 1e6,
    country_code="US"
)

With Module 3 (AI Execution)

# Module 3 uses EnergyEngine as wrapper
engine = EnergyEngine(config)

@engine.measure(iterations=10)
def run_agentic_ai():
    # Agentic AI code
    return result

# Or context manager
with engine as measurement:
    result = run_agentic_ai()
    print(f"Energy used: {measurement.package_energy_joules} µJ")

With Module 4 (Database)

