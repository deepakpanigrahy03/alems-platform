🚀 Usage Examples

Basic Usage

from core.energy_engine import EnergyEngine
from core.config_loader import ConfigLoader

# Load config from Module 0
config = ConfigLoader()
engine = EnergyEngine(config)

# Measure a function
with engine as measurement:
    result = my_ai_function()

print(f"Energy used: {measurement.package_energy_joules / 1e6:.4f} J")
print(f"Uncore waste: {measurement.uncore_waste_uj / 1e6:.4f} J")


Multiple Runs with Statistics

# Run 10 times with 30-second cool-down
results = engine.run_multiple(
    func=my_agentic_ai,
    iterations=10,
    cool_down=30
)

# Access statistics
print(f"Mean energy: {results.summary.package_energy_joules.mean:.4f} J")
print(f"Std dev: {results.summary.package_energy_joules.std_dev:.4f} J")




Command Line Interface

# Run a script 10 times
python -m energy_wrapper run agentic_ai.py --n 10 --output results.json

# Compare linear vs agentic
python -m energy_wrapper compare linear.py agentic.py --n 10