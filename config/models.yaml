# =============================================================================
# A-LEMS Model Registry — models.yaml
# Human-editable source. Loader expands defaults at runtime.
# =============================================================================
#
# HOW DEFAULTS WORK:
#   _defaults          → applies to ALL models everywhere
#   provider.defaults  → applies to all models in that provider
#   model fields       → override anything above
#
# FIELD REFERENCE:
#   is_local            true = runs on THIS host (UBUNTU2505)
#   access_method       api_http | direct_file | local_process
#   network_type        none | loopback | internet
#   captures_network_io true = HTTP bytes_sent/recv meaningful
#   energy_side         full | client_only | remote_measured
#   execution_site      host | remote_vm | vendor_api
#                         host       = inference runs on THIS machine (UBUNTU2505)
#                         remote_vm  = controlled remote VM (Oracle VM)
#                         vendor_api = third-party hosted API
#   transport           inprocess | loopback_http | remote_http
#                         inprocess    = same process, no socket (llama_cpp direct_file)
#                         loopback_http= localhost HTTP (ollama_local)
#                         remote_http  = network HTTP (ollama_remote, groq, openai etc)
#   energy_visibility   host_only | host_plus_remote
#                         host_only        = only UBUNTU2505 energy measured
#                         host_plus_remote = both client + remote VM measured (future)
#   openai_compat       true = speaks /chat/completions format
#   cost_class          free | paid | metered
#   priority            int, lower = preferred when auto-routing
#   rate_limit_tpm      tokens/min or null
#   tasks               text-generation | text-to-speech | voice-cloning | speech-to-text
#   modes               linear | agentic
#   tools_supported     supports function/tool calling
#   available           false to disable without deleting
# =============================================================================

_defaults:
  temperature: 0.7
  max_tokens: 2048
  modes: [linear, agentic]
  tasks: [text-generation]
  available: true
  tools_supported: false

# =============================================================================
# BACKWARD COMPAT — get_model_config("cloud","linear") still works
# Maps old flat keys to new provider entries
# =============================================================================
# Maps old get_model_config("cloud","linear") calls to proper provider+model_id
# get_backward_compat() resolves through get_model() — full proper path, no duplication
_legacy_map:
  cloud:
    linear:  {provider: groq,      model_id: llama-3.3-70b-versatile, max_tokens: 1024,  tools_supported: false}
    agentic: {provider: groq,      model_id: llama-3.3-70b-versatile, max_tokens: 2048,  tools_supported: true}
  local:
    linear:  {provider: llama_cpp, model_id: tinyllama-1b-gguf,       max_tokens: 1024,  tools_supported: false}
    agentic: {provider: llama_cpp, model_id: tinyllama-1b-gguf,       max_tokens: 2048,  tools_supported: true}

