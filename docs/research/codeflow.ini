
1.Initialization Flow
EnergyEngine.__init__()
    ↓
    ├── Load config from Module 0
    │   ├── hw_config.json (paths)
    │   ├── app_settings.yaml (sampling rate)
    │   └── .env (debug mode)
    ↓
    ├── Initialize all readers
    │   ├── RAPLReader
    │   ├── PerfReader
    │   ├── TurbostatReader
    │   ├── SensorReader
    │   ├── MSRReader
    │   └── SchedulerMonitor
    ↓
    └── Detect available hardware
        ├── Log available RAPL domains
        ├── Log thermal zones
        ├── Log MSR devices
        └── Set measurement state = IDLE


2.Measurement Flow

        User code: with EnergyEngine() as ee:
    ↓
EnergyEngine.__enter__()
    ↓
    ├── pin_cores()                    # Req 1.15
    ├── measure_idle_baseline()        # Req 1.45 (if not already done)
    ├── start_measurement()
    │   ├── Record start_time
    │   ├── Capture initial RAPL readings
    │   ├── Start sampling thread       # Req 1.46
    │   └── Set state = MEASURING
    ↓
User code executes
    ↓
EnergyEngine.__exit__()
    ↓
    ├── stop_measurement()
    │   ├── Stop sampling thread
    │   ├── Capture final readings
    │   ├── Collect all samples
    │   ├── Calculate differences
    │   ├── Apply idle baseline correction
    │   ├── Validate measurement
    │   └── Create EnergyMeasurement object
    ↓
    └── Return measurement to user


    3.Sampling Thread Flow (Req 1.46)

    Sampling thread started
    ↓
while sampling_active:
    ↓
    ├── Read all RAPL domains
    ├── Add sample to queue
    ├── Calculate next sample time
    ├── Sleep until next sample
    └── Handle queue full (remove oldest)
    ↓
When stopped: flush queue to samples list